<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
  <title>display page</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar navbar-dark bg-dark">
    
  <a class="navbar-brand" href="/Home/">SMS</a>
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarSupportedContent">
    <ul class="navbar-nav mr-auto">
      <li class="nav-item active">
        <a class="nav-link" href="/Home/">Home<span class="sr-only">(current)</span></a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/insert-student/">Insert student</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/display-student/">display student</a>
      </li>
     
      
    </ul>
    
  </div>
  <ul class="navbar-nav">
        <li class="nav-item">
          <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
        </li>
      </ul>
</nav>
<br><br>
<div class="p-3 mb-2 bg-secondary text-dark ">
  
<div class="jumbotron" style='text-align:center;margin-left:200px;margin-right:200px;'>
  <h1><i>All student list</i></h1><br>
     
       <table class="table table-sm">
  <thead>
    <tr class="table-active">
      <th scope="col">s_id</th>
      <th scope="col">first_name</th>
      <th scope="col">last_name</th>
      <th scope="col">email</th>
      <th scope="col">phone</th>
      <th scope="col">Actions</th>


    </tr>
  </thead>
  <tbody class="table-success">
    {% for s in data%}
    <tr>
      <td>{{s.s_id}}</td>
      <td>{{s.first_name}}</td>
      <td>{{s.last_name}}</td>
      <td>{{s.email}}</td>
      <td>{{s.phone}}</td>
      <td>
         <a href="/edit-student/{{s.s_id}}/" class="btn btn-warning">Edit</a> |
         <a href="/delete-student/{{s.s_id}}/" class="btn btn-danger">Delete</a>
     </td>


    </tr>
    {% endfor %}
    
  </tbody>
</table>
</div>
</div>


</body>
</html>
